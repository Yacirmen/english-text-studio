databases:
  - name: readlex-db
    plan: free
    databaseName: readlex
    user: readlex

services:
  - type: web
    name: readlex-staging
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PROVIDER
        value: hf
      - key: HF_MODEL
        value: Qwen/Qwen2.5-72B-Instruct
      - key: DATABASE_URL
        fromDatabase:
          name: readlex-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://english-text-studio-staging.onrender.com
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
