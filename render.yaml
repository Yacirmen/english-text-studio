databases:
  - name: english-text-studio-db
    plan: free
    databaseName: english_text_studio
    user: english_text_studio

services:
  - type: web
    name: english-text-studio-staging
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.lexical_backfill --json && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PROVIDER
        value: hf
      - key: HF_MODEL
        value: Qwen/Qwen2.5-72B-Instruct
      - key: DATABASE_URL
        fromDatabase:
          name: english-text-studio-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://english-text-studio-staging.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://english-text-studio-staging.onrender.com
      - key: COOKIE_SECURE
        value: "true"
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
